spring:
  application:
    name: ai-website-builder
  datasource:
    url: jdbc:h2:mem:aibuilderdb
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

# Custom application properties
app:
  jwt:
    secret: 9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
    expirationMs: 86400000
  openai:
    api-key: YOUR_OPENAI_API_KEY
